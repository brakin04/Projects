{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <!-- Edit aspects of a single expense -->
        <h2>Edit Expense: At {{ expense.where }} on {{ expense.date }}</h2>
        <form method="POST" class="mt-3">
            <div class="mb-3">
                <label>Date</label>
                <input type="date" name="date" class="form-control" value="{{ expense.date }}" required>
            </div>
            <div class="mb-3">
                <label>Amount</label>
                <input type="number" name="amount" class="form-control" step=".01" min="0" value="{{ expense.amount }}" required>
            </div>
            <div class="mb-3">
                <label>Where</label>
                <input type="text" name="where" class="form-control" value="{{ expense.where }}" required>
            </div>
            <div class="mb-3">
                <label>Category</label>
                <select name="category" id="string_choice" required>
                    {% for category in categories %}
                    <option value="{{ category.name }}" {% if category.name == expense.category  %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}    
                </select>
            </div>
            <div class="mb-3">
                <label>Description</label>
                <input type="text" name="description" class="form-control" value="{{ expense.description }}">
            </div>
            <!-- <div class="mb-3">
                <label>Recurring</label>
                <input type="checkbox" name="recurring" class="form-check-input" {% if expense.recurring %}checked{% endif %}>
            </div> -->
            <button type="submit" class="btn btn-primary">Update Expense</button>
        </form>
    </div>
</div>
{% endblock %}
