{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h2>Delete {{type}}: {{ to_see }}?</h2>
        <form method="POST" action="/{{cancel_location}}/delete" class="mt-3">
            <p>Are you sure you want to delete this {{type}}? This action cannot be undone.</p>
            <input type="hidden" name="id" value="{{ id }}">
            <button type="submit" class="btn btn-danger">Confirm Delete</button>
            <a href="{{ url_for('finance.' + cancel_location) }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
