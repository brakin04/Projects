{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <!-- State every aspect of a budget row -->
    <div class="card-body">
        <div class="mb-3 d-flex justify-content-between">
            <h2>Add a budget row</h2>
            <a href="{{ url_for('main.add_category') }}" class="btn btn-outline-secondary w-15">Add Category</a>
        </div>
        <form method="POST" class="mt-3">
            <div class="mb-3">
                <label>Amount</label>
                <input type="number" name="amount" class="form-control" step=".01" min="0" required>
            </div>
            <div class="mb-3">
                <label>Category</label>
                <select name="category" id="string_choice" required>
                    {% for category in categories %}
                    <option value="{{ category.name }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3 d-flex justify-content-end">
                <button type="submit" class="btn btn-success">Submit</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
